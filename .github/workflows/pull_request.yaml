name: Pull Request Workflow

on:
  pull_request:
    branches:
      - master

jobs:
  check_formatting:
    uses: ryanmrichard/.github/.github/workflows/check_formatting.yaml@master

  test_nwx_docs:
    uses: ryanmrichard/.github/.github/workflows/test_nwx_docs.yaml@master
    with:
      doc_target: "wtf_cxx_api"

  test_cmake_build:
    uses: ryanmrichard/.github/.github/workflows/test_nwx_cmake_build.yaml@master

  test_pip_build:
    uses: ryanmrichard/.github/.github/workflows/test_nwx_pip_build.yaml@master

  platform_matrix:
    uses: ryanmrichard/.github/.github/workflows/platform_matrix.yaml@master

  test_pypi_deploy:
    needs: platform_matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.platform_matrix.outputs.release_matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Build PyPI Distribution
        uses: ryanmrichard/.github/.github/actions/build_pypi_dist@master
        with:
          cibw_build: ${{ matrix.cibw_build }}
          build_sdist: ${{ matrix.os == 'ubuntu-latest' && 'true' || 'false' }}
