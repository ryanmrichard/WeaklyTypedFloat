name: Pull Request Workflow

on:
  pull_request:
    branches:
      - master

jobs:
  check_formatting:
    uses: NWChemEx/.github/.github/workflows/check_formatting.yaml@master

  test_nwx_docs:
    uses: NWChemEx/.github/.github/workflows/test_nwx_docs.yaml@master
    with:
      doc_target: "wtf_cxx_api"

  test_library:
    uses: NWChemEx/.github/.github/workflows/test_nwx_library.yaml@master
    with:
      compilers: '["gcc-14", "clang-18"]'

  test_python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc-14, clang-18]
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler (${{ matrix.compiler }})
        run: |
          sudo apt-get update -y
          if [[ "${{ matrix.compiler }}" == gcc-* ]]; then
            version=$(echo "${{ matrix.compiler }}" | sed 's/gcc-//')
            sudo apt-get install -y gcc-${version} g++-${version}
            echo "CC=gcc-${version}" >> $GITHUB_ENV
            echo "CXX=g++-${version}" >> $GITHUB_ENV
          else
            version=$(echo "${{ matrix.compiler }}" | sed 's/clang-//')
            sudo apt-get install -y clang-${version}
            echo "CC=clang-${version}" >> $GITHUB_ENV
            echo "CXX=clang++-${version}" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Editable install (dev)
        run: pip install -e ".[dev]"

      - name: Run C++ tests
        run: cd build && ctest --output-on-failure

      - name: Run Python tests
        run: pytest tests/python/

  deploy_to_testpypi:
    needs: test_python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
